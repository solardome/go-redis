# .github/workflows/govulncheck.yml
name: govulncheck

on:
  pull_request:
    branches: [master, v9, v9.7, v9.8, 'ndyakov/**', 'ofekshenawa/**', 'ce/**']
  push:
    branches: [master, v9, 'v9.*']
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: govulncheck-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: govulncheck (go ${{ matrix.go-version }})
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.25.x"
          - oldstable
          - stable

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.2.0

      - name: Run govulncheck
        run: govulncheck ./...